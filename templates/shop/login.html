{% extends 'shop/base.html' %}

{% block main_class %}main-center{% endblock %}

{% block title %}Log In - Dota 2 Shop{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Log In</h1>
    <p class="subtitle">Sign in to your account</p>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p class="auth-footer">
        Don&apos;t have an account? <a href="{% url 'shop:register' %}">Register</a>
    </p>
</div>
{% endblock %}
